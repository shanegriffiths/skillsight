name: Release

# Publishes to npm when a v* tag is pushed, e.g. `git tag v0.1.0 && git push --tags`.
# The published tarball carries a signed provenance statement linking it to this
# exact commit and workflow run (the verified badge on npmjs.com).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # REQUIRED: lets the runner mint the OIDC token that signs provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x.
      # Harmless for any auth mode, required for the tokenless (OIDC) path.
      - run: npm install -g npm@latest

      - run: npm ci

      # Guard: the git tag (v0.1.0) must match the package.json version (0.1.0),
      # so you can never ship a tarball whose version disagrees with its tag.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Tokenless publish via OIDC (Trusted Publisher configured on npmjs.com for
      # shanegriffiths/skillsight + release.yml). npm >= 11.5.1 auto-mints the
      # credential from the id-token above — no NPM_TOKEN secret involved.
      # `--access public` + `--provenance` are also set in package.json#publishConfig;
      # under trusted publishing provenance is automatic, but stating it is harmless.
      - name: Publish to npm
        run: npm publish --provenance --access public
